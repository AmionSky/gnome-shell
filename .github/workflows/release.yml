name: Release CI

on:
  release:
    types: published
  workflow_dispatch:
    inputs:
      tag:
        description: 'Publish tag (latest or next)'
        required: false
        default: 'latest'

env:
  node-version: 22.x

jobs:
  release:
    name: Release CI
    runs-on: ubuntu-24.04
    environment: npm-release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Use Node.js ${{ env.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.node-version }}

      - name: Install dependencies
        run: yarn install

      - name: Build Types
        run: yarn run build:types

      - name: Generate archive
        run: yarn workspace @girs/gnome-shell pack

      - name: Get OIDC token
        uses: actions/github-script@v7
        id: oidc
        with:
          script: |
            const token = await core.getIDToken('npm:registry.npmjs.org');
            core.setSecret(token);
            core.setOutput('token', token);

      - name: Publish
        env:
          OIDC_TOKEN: ${{ steps.oidc.outputs.token }}
          PUBLISH_TAG: ${{ github.event.release.prerelease && 'next' || inputs.tag || 'latest' }}
        run: |
          NPM_TOKEN=$(curl -sSfL "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/@girs%2fgnome-shell" \
            -X POST \
            -H "Authorization: Bearer ${OIDC_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{}' | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
          yarn config set npmRegistryServer "https://registry.npmjs.org"
          yarn config set npmAlwaysAuth true
          yarn config set npmAuthToken "${NPM_TOKEN}"
          yarn workspace @girs/gnome-shell npm publish --tolerate-republish --access public --provenance --tag "${PUBLISH_TAG}"
