name: Release CI

on:
  release:
    types: published
  workflow_dispatch:
    inputs:
      tag:
        description: 'Publish tag (latest or next)'
        required: false
        default: 'latest'

env:
  node-version: 22.x

jobs:
  release:
    name: Release CI
    runs-on: ubuntu-24.04
    environment: npm-release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # No registry-url: actions/setup-node would inject a NODE_AUTH_TOKEN
      # placeholder that makes npm skip OIDC and fall back to token auth.
      # The registry defaults to https://registry.npmjs.org.
      - name: Use Node.js ${{ env.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.node-version }}

      - name: Install dependencies
        run: yarn install

      - name: Build Types
        run: yarn run build:types

      - name: Generate archive
        run: yarn workspace @girs/gnome-shell pack

      - name: Publish
        env:
          PUBLISH_TAG: ${{ github.event.release.prerelease && 'next' || inputs.tag || 'latest' }}
        run: npm publish packages/gnome-shell --access public --provenance --tag "$PUBLISH_TAG"
